<!DOCTYPE html>
<html>
<head>
    <title>Chat Bot</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        .box {
            width: 400px;
            margin: auto;
            margin-top: 60px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }

        .reply {
            margin-top: 20px;
            background: #e6f7ff;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🤖 Django Chat Bot</h2>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="message" placeholder="Type here..." required>
        <br><br>
        <button type="submit">Send</button>
    </form>

    {% if reply %}
    <div class="reply">
        <b>Bot:</b> {{ reply }}
    </div>
    {% endif %}
</div>

</body>
</html>
